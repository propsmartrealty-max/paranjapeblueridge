name: Sovereign Indexing Crawler Engine

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  websub_ping:
    name: WebSub & IndexNow Ping
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Ping Google WebSub
        run: |
          echo "📡 Pinging Google WebSub to ingest RSS feed..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST -d "hub.mode=publish" -d "hub.url=https://www.paranjapeblueridge.com/feed.xml" https://pubsubhubbub.appspot.com)
          if [ "$RESPONSE" -eq 204 ]; then
            echo "✅ Google WebSub successfully accepted the ping."
          else
            echo "⚠️ Google WebSub returned HTTP $RESPONSE."
          fi

      - name: Trigger IndexNow Sweep (Bing/Yahoo)
        run: |
          echo "⚡ Running IndexNow push..."
          npx tsx scripts/trigger-indexnow.ts || echo "IndexNow script execution failed but continuing workflow."

      - name: Trigger Google Indexing API
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$GOOGLE_SERVICE_ACCOUNT_JSON" ]; then
            echo "⚠️ Secret missing: Skipping Indexing API"
          else
            echo "🚀 Executing Google Indexing API push..."
            npx tsx scripts/trigger-google-indexing.ts
          fi
