name: Sovereign Indexing Engine v7.0

on:
  # Auto-trigger on deployment — indexes changed pages first
  push:
    branches:
      - main
  # Manual trigger via GitHub UI
  workflow_dispatch:
    inputs:
      force_all:
        description: 'Force re-index all pending URLs (ignore cache)'
        required: false
        default: 'false'
  # Scheduled daily sweep at 6 AM IST (12:30 AM UTC)
  schedule:
    - cron: '30 0 * * *'

jobs:
  sovereign_indexing:
    name: Google Indexing API Sweep
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Repository (with full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need parent commit to compute diff

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts || npm install googleapis --ignore-scripts

      - name: Detect Changed Pages from Git Diff
        id: changed
        run: |
          # Map changed source files → live URLs
          # Collect all changed files in this push
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          SITE="https://www.paranjapeblueridge.com"
          URLS=""

          while IFS= read -r file; do
            # src/app/page.tsx → homepage
            if [[ "$file" == "src/app/page.tsx" ]]; then
              URLS="$URLS $SITE/"
            # src/app/[slug]/page.tsx → dynamic route (will sweep via sitemap)
            elif [[ "$file" == src/app/\[slug\]/* ]]; then
              URLS="$URLS __SWEEP_CHANGED__"
            # src/app/(any)/page.tsx → static route
            elif [[ "$file" =~ ^src/app/(.+)/page\.tsx$ ]]; then
              ROUTE="${BASH_REMATCH[1]}"
              URLS="$URLS $SITE/$ROUTE"
            # data changes → re-index all PSEO routes
            elif [[ "$file" == src/data/* ]] || [[ "$file" == data/*.json ]]; then
              URLS="$URLS __SWEEP_CHANGED__"
            # component changes → re-index homepage + all changed templates
            elif [[ "$file" == src/components/* ]]; then
              URLS="$URLS $SITE/"
            fi
          done <<< "$CHANGED"

          # Deduplicate
          URLS=$(echo $URLS | tr ' ' '\n' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "Mapped URLs: $URLS"
          echo "changed_urls=$URLS" >> $GITHUB_OUTPUT

      - name: Execute Sovereign Indexing Engine v7.0
        env:
          GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          CHANGED_URLS: ${{ steps.changed.outputs.changed_urls }}
          FORCE_ALL: ${{ github.event.inputs.force_all || 'false' }}
          TRIGGER: ${{ github.event_name }}
        run: |
          if [ -z "$GCP_SERVICE_ACCOUNT" ]; then
            echo "❌ FATAL: GCP_SERVICE_ACCOUNT secret is not configured."
            echo "   Go to: Settings → Secrets → Actions → New repository secret"
            echo "   Name: GCP_SERVICE_ACCOUNT"
            echo "   Value: (paste your service account JSON)"
            exit 1
          fi
          node scripts/sovereign-indexing.js

      - name: Commit Indexing State
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/google-index-cache.json data/indexing-audit.json 2>/dev/null || true
          git commit -m "chore(seo): update google indexing cache and audit log [skip ci]" || echo "No changes to commit"
          git push

      - name: Upload Audit Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: indexing-audit-${{ github.run_number }}
          path: data/indexing-audit.json
          retention-days: 30
