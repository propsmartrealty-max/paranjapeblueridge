name: Sovereign Indexing Crawler Engine

on:
  # Auto-trigger on deployment
  push:
    branches:
      - main
  # Manual trigger via GitHub UI
  workflow_dispatch:
  # Scheduled daily sweep at 6 AM IST (12:30 AM UTC)
  schedule:
    - cron: '30 0 * * *'

jobs:
  sitemap_ping:
    name: Googlebot & IndexNow Ping
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --ignore-scripts

      - name: Ping Google Crawler
        run: |
          echo "📡 Pinging Google Crawler to fetch sitemap..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "https://www.google.com/ping?sitemap=https://www.paranjapeblueridge.com/sitemap.xml")
          if [ "$RESPONSE" -eq 200 ]; then
            echo "✅ Google successfully acknowledged the sitemap ping."
          else
            echo "⚠️ Google returned HTTP $RESPONSE. Note: Google recently deprecated explicit pings, but it may still signal crawlers."
          fi

      - name: Trigger IndexNow Sweep (Bing/Yahoo)
        run: |
          echo "⚡ Running IndexNow push..."
          npx tsx scripts/trigger-indexnow.ts || echo "IndexNow script execution failed but continuing workflow."
